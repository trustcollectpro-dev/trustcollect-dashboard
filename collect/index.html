<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laissez votre avis — TrustCollect</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0B0B10;
    color: #E8E8F0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  .logo {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #6D5EF5;
    margin-bottom: 32px;
    opacity: 0.8;
  }

  .card {
    background: #14141B;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.5);
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #F0F0FA;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .subtitle {
    font-size: 14px;
    color: #6B6B7E;
    margin-bottom: 32px;
  }

  .stars-section { margin-bottom: 28px; }
  .stars-label { font-size: 13px; font-weight: 500; color: #9898AC; margin-bottom: 12px; }
  .stars { display: flex; gap: 8px; align-items: center; }
  .star {
    font-size: 36px;
    cursor: pointer;
    transition: transform 0.12s, filter 0.12s;
    color: #2A2A38;
    user-select: none;
    line-height: 1;
  }
  .star.active { color: #F5C518; }
  .star.hov { color: #F5C518; filter: brightness(1.2); transform: scale(1.15); }
  .star-hint {
    font-size: 12px;
    color: #6D5EF5;
    font-weight: 500;
    margin-left: 8px;
    min-height: 16px;
  }

  .field { margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 500; color: #9898AC; margin-bottom: 8px; }

  textarea, input[type="text"], input[type="email"] {
    width: 100%;
    background: #0B0B10;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #E8E8F0;
    font-family: inherit;
    font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    resize: none;
  }
  textarea { padding: 14px 16px; min-height: 120px; }
  input[type="text"], input[type="email"] { padding: 12px 16px; }

  textarea:focus, input:focus {
    border-color: #6D5EF5;
    box-shadow: 0 0 0 3px rgba(109,94,245,0.15);
  }
  textarea::placeholder, input::placeholder { color: #3E3E52; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .btn-submit {
    width: 100%;
    padding: 15px;
    background: #6D5EF5;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, opacity 0.2s;
    margin-top: 8px;
    letter-spacing: 0.01em;
  }
  .btn-submit:hover:not(:disabled) { background: #7C6EFF; transform: translateY(-1px); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .error-msg {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    color: #F87171;
    font-size: 13px;
    padding: 10px 14px;
    margin-top: 14px;
    display: none;
  }

  .success {
    text-align: center;
    padding: 20px 0;
    display: none;
  }
  .success-icon {
    width: 72px; height: 72px;
    background: rgba(34,197,94,0.12);
    border: 2px solid rgba(34,197,94,0.4);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 32px;
  }
  .success h2 { font-size: 20px; font-weight: 700; color: #F0F0FA; margin-bottom: 8px; }
  .success p { font-size: 14px; color: #6B6B7E; line-height: 1.6; }

  .footer {
    margin-top: 24px;
    font-size: 12px;
    color: #3E3E52;
    text-align: center;
  }
  .footer a { color: #6D5EF5; text-decoration: none; }

  @media (max-width: 480px) {
    .card { padding: 28px 20px; }
    .row { grid-template-columns: 1fr; gap: 0; }
    .star { font-size: 30px; }
  }
</style>
</head>
<body>

<div class="logo">TrustCollect</div>

<div class="card">
  <div class="success" id="success">
    <div class="success-icon">&#10003;</div>
    <h2>Merci pour votre avis !</h2>
    <p>Votre témoignage a bien été reçu.<br>Il aide d'autres personnes à faire le bon choix.</p>
  </div>

  <div id="formArea">
    <h1>Partagez votre expérience</h1>
    <p class="subtitle">Votre avis aide d'autres personnes à faire le bon choix.</p>

    <div class="stars-section">
      <div class="stars-label">Votre note globale</div>
      <div class="stars" id="stars">
        <span class="star" data-v="1">&#9733;</span>
        <span class="star" data-v="2">&#9733;</span>
        <span class="star" data-v="3">&#9733;</span>
        <span class="star" data-v="4">&#9733;</span>
        <span class="star" data-v="5">&#9733;</span>
        <span class="star-hint" id="starHint"></span>
      </div>
    </div>

    <div class="field">
      <label for="avis">Votre témoignage <span style="color:#6D5EF5">*</span></label>
      <textarea id="avis" placeholder="Décrivez votre expérience en quelques mots…"></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label for="nom">Prénom</label>
        <input type="text" id="nom" placeholder="Jean">
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="jean@email.com">
      </div>
    </div>

    <button class="btn-submit" id="submitBtn" disabled>Envoyer mon avis</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>

<div class="footer">Propulsé par <a href="https://trustcollect.pro" target="_blank">TrustCollect</a></div>

<script>
  const WEBHOOK = 'https://hook.eu1.make.com/31uhf2jsqkfhmvttcb1qwbhgzjhm33bg';
  const hints = ['', 'Mauvais', 'Passable', 'Bien', 'Très bien', 'Excellent !'];
  const clientId = new URLSearchParams(window.location.search).get('id') || '';

  let note = 0;
  const stars = document.querySelectorAll('.star');
  const starHint = document.getElementById('starHint');
  const submitBtn = document.getElementById('submitBtn');
  const avisEl = document.getElementById('avis');
  const errorMsg = document.getElementById('errorMsg');

  function setStars(val) {
    stars.forEach(s => s.classList.toggle('active', parseInt(s.dataset.v) <= val));
    starHint.textContent = hints[val] || '';
  }

  stars.forEach(star => {
    star.addEventListener('mouseover', () => {
      const v = parseInt(star.dataset.v);
      stars.forEach(s => s.classList.toggle('hov', parseInt(s.dataset.v) <= v));
    });
    star.addEventListener('mouseout', () => stars.forEach(s => s.classList.remove('hov')));
    star.addEventListener('click', () => {
      note = parseInt(star.dataset.v);
      setStars(note);
      checkForm();
    });
  });

  avisEl.addEventListener('input', checkForm);

  function checkForm() {
    submitBtn.disabled = !(note > 0 && avisEl.value.trim().length > 3);
  }

  submitBtn.addEventListener('click', async () => {
    errorMsg.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Envoi en cours…';

    try {
      const res = await fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          note,
          avis: avisEl.value.trim(),
          nom: document.getElementById('nom').value.trim(),
          email: document.getElementById('email').value.trim(),
          clientId
        })
      });

      if (!res.ok) throw new Error('Erreur ' + res.status);

      document.getElementById('formArea').style.display = 'none';
      document.getElementById('success').style.display = 'block';
    } catch(e) {
      errorMsg.textContent = 'Une erreur est survenue. Veuillez réessayer.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Envoyer mon avis';
    }
  });
</script>
</body>
</html>
