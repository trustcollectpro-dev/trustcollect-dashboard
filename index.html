<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustCollect — Mon Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #F5F5FF;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* — HEADER — */
    header {
      background: #4F46E5;
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 12px rgba(79,70,229,.25);
    }
    header .logo { font-size: 22px; font-weight: 700; letter-spacing: -.5px; }
    header .logo span { color: #A5B4FC; }

    /* — MAIN — */
    main {
      max-width: 860px;
      margin: 40px auto;
      padding: 0 20px 60px;
    }

    /* — LOADING / ERROR — */
    .state-msg {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
      font-size: 16px;
    }
    .state-msg.error { color: #dc2626; }

    /* — CLIENT CARD — */
    .client-card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      box-shadow: 0 2px 16px rgba(0,0,0,.07);
      margin-bottom: 32px;
    }
    .client-card h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .client-card .email {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .meta-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }
    .badge-plan  { background: #EEF2FF; color: #4F46E5; }
    .badge-actif { background: #DCFCE7; color: #15803d; }
    .badge-essai { background: #FEF9C3; color: #854d0e; }
    .badge-inactif { background: #FEE2E2; color: #dc2626; }
    .badge-date  { background: #F3F4F6; color: #6b7280; }

    /* — AVIS SECTION — */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title .count {
      background: #4F46E5;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .avis-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .avis-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      box-shadow: 0 1px 8px rgba(0,0,0,.06);
      border-left: 4px solid #4F46E5;
    }
    .avis-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .avis-nom { font-weight: 600; font-size: 15px; }
    .stars { color: #F59E0B; font-size: 16px; letter-spacing: 1px; }
    .avis-text {
      color: #374151;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 10px;
    }
    .avis-footer {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .avis-date { color: #9ca3af; font-size: 12px; }
    .avis-statut {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .statut-approuve { background: #DCFCE7; color: #15803d; }
    .statut-attente  { background: #FEF9C3; color: #92400e; }
    .statut-refuse   { background: #FEE2E2; color: #dc2626; }

    .empty-avis {
      text-align: center;
      padding: 40px;
      color: #9ca3af;
      font-size: 14px;
      background: #fff;
      border-radius: 14px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Trust<span>Collect</span></div>
    <span style="opacity:.6;font-size:14px;">— Mon Dashboard</span>
  </header>

  <main>
    <div id="app"><div class="state-msg">Chargement…</div></div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const clientId = params.get('id');

    function stars(n) {
      if (!n) return '';
      const full = Math.round(n);
      return '★'.repeat(full) + '☆'.repeat(Math.max(0, 5 - full));
    }

    function formatDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return d;
      return dt.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function statutBadgeClass(s) {
      if (!s) return '';
      const l = s.toLowerCase();
      if (l.includes('actif') && !l.includes('in')) return 'badge-actif';
      if (l.includes('essai')) return 'badge-essai';
      return 'badge-inactif';
    }

    function avisBadgeClass(s) {
      if (!s) return '';
      const l = s.toLowerCase();
      if (l.includes('approu')) return 'statut-approuve';
      if (l.includes('refus')) return 'statut-refuse';
      return 'statut-attente';
    }

    async function load() {
      const app = document.getElementById('app');

      if (!clientId) {
        app.innerHTML = '<div class="state-msg error">⚠️ Aucun identifiant client fourni dans l\'URL.<br><small>Ajoutez <code>?id=recXXXXXXXX</code></small></div>';
        return;
      }

      try {
        const res = await fetch('/api/dashboard?id=' + encodeURIComponent(clientId));
        const data = await res.json();

        if (!res.ok) {
          app.innerHTML = '<div class="state-msg error">Erreur : ' + (data.error || 'Client introuvable') + '</div>';
          return;
        }

        const c = data.client;
        const avis = data.avis || [];

        const avisHtml = avis.length === 0
          ? '<div class="empty-avis">Aucun avis pour le moment.</div>'
          : avis.map(a => `
              <div class="avis-card">
                <div class="avis-header">
                  <span class="avis-nom">${escHtml(a.nom)}</span>
                  <span class="stars">${stars(a.note)}</span>
                </div>
                <p class="avis-text">${escHtml(a.avis || '')}</p>
                <div class="avis-footer">
                  ${a.date ? '<span class="avis-date">' + formatDate(a.date) + '</span>' : ''}
                  ${a.statut ? '<span class="avis-statut ' + avisBadgeClass(a.statut) + '">' + escHtml(a.statut) + '</span>' : ''}
                </div>
              </div>
            `).join('');

        app.innerHTML = `
          <div class="client-card">
            <h2>${escHtml(c.name || 'Client')}</h2>
            <p class="email">${escHtml(c.email || '')}</p>
            <div class="meta-row">
              ${c.plan ? '<span class="badge badge-plan">📦 ' + escHtml(c.plan) + '</span>' : ''}
              ${c.statut ? '<span class="badge ' + statutBadgeClass(c.statut) + '">' + escHtml(c.statut) + '</span>' : ''}
              ${c.dateInscription ? '<span class="badge badge-date">📅 Inscrit le ' + formatDate(c.dateInscription) + '</span>' : ''}
            </div>
          </div>

          <div class="section-title">
            Avis reçus
            <span class="count">${avis.length}</span>
          </div>
          <div class="avis-list">${avisHtml}</div>
        `;

      } catch (err) {
        document.getElementById('app').innerHTML = '<div class="state-msg error">Erreur réseau : ' + escHtml(err.message) + '</div>';
      }
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    load();
  </script>
</body>
</html>
