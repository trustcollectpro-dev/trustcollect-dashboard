<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrustCollect — Mon Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0b14;
      color: #e2e0ea;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: #0d0b14;
      border-bottom: 1px solid #1e1b2e;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo span.trust { color: #ffffff; }
    .logo span.collect { color: #6B46FF; }
    .header-badge {
      font-size: 12px;
      color: #8b85a0;
      background: #1a1729;
      border: 1px solid #2a2540;
      padding: 4px 12px;
      border-radius: 20px;
    }

    /* MAIN */
    main { max-width: 900px; margin: 0 auto; padding: 40px 24px; }

    /* LOADING / ERROR */
    #loading, #error {
      text-align: center;
      padding: 80px 24px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #2a2540;
      border-top-color: #6B46FF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: #8b85a0; font-size: 14px; }
    #error p { color: #f87171; }

    /* CLIENT CARD */
    #dashboard { display: none; }
    .client-card {
      background: #13111f;
      border: 1px solid #1e1b2e;
      border-radius: 16px;
      padding: 28px 32px;
      margin-bottom: 32px;
      position: relative;
      overflow: hidden;
    }
    .client-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #6B46FF, #9B7FFF);
    }
    .client-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .client-avatar {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #6B46FF, #9B7FFF);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .client-info { flex: 1; min-width: 0; }
    .client-name { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .client-email { font-size: 14px; color: #8b85a0; margin-bottom: 12px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge {
      font-size: 12px; font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid transparent;
    }
    .badge-plan    { background: #1e1550; border-color: #3a2d99; color: #a89dff; }
    .badge-actif   { background: #0d2d1a; border-color: #1a5c34; color: #4ade80; }
    .badge-essai   { background: #2d1f0a; border-color: #5c3d14; color: #fbbf24; }
    .badge-inactif { background: #2d0d0d; border-color: #5c1a1a; color: #f87171; }
    .badge-date    { background: #1a1729; border-color: #2a2540; color: #8b85a0; }
    .client-stats {
      display: flex; gap: 24px; flex-wrap: wrap;
      margin-top: 20px; padding-top: 20px;
      border-top: 1px solid #1e1b2e;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 28px; font-weight: 800; color: #fff; }
    .stat-value.purple { color: #6B46FF; }
    .stat-label { font-size: 12px; color: #8b85a0; margin-top: 2px; }

    /* SECTION AVIS */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 18px; font-weight: 700; color: #fff;
      display: flex; align-items: center; gap: 10px;
    }
    .section-count {
      background: #6B46FF;
      color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }
    .avg-stars {
      display: flex; align-items: center; gap: 6px;
      font-size: 14px; color: #8b85a0;
    }

    /* AVIS CARDS */
    .avis-grid { display: flex; flex-direction: column; gap: 16px; }
    .avis-card {
      background: #13111f;
      border: 1px solid #1e1b2e;
      border-left: 3px solid #6B46FF;
      border-radius: 12px;
      padding: 20px 24px;
      transition: border-color 0.2s;
    }
    .avis-card:hover { border-left-color: #9B7FFF; }
    .avis-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 12px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .avis-reviewer { }
    .avis-nom { font-size: 15px; font-weight: 600; color: #fff; }
    .avis-email { font-size: 12px; color: #6B46FF; margin-top: 2px; }
    .avis-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .stars { color: #F59E0B; font-size: 16px; letter-spacing: 1px; }
    .avis-date { font-size: 12px; color: #8b85a0; }
    .avis-text { font-size: 14px; color: #c4bfd4; line-height: 1.65; margin-bottom: 12px; }
    .avis-footer { display: flex; align-items: center; gap: 8px; }
    .statut-badge {
      font-size: 11px; font-weight: 600;
      padding: 3px 10px; border-radius: 20px;
    }
    .statut-approuve  { background: #0d2d1a; color: #4ade80; }
    .statut-pending   { background: #2d1f0a; color: #fbbf24; }
    .statut-rejete    { background: #2d0d0d; color: #f87171; }
    .affiche-badge {
      font-size: 11px; color: #6B46FF;
      background: #1e1550;
      padding: 3px 10px; border-radius: 20px;
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center; padding: 60px 24px;
      background: #13111f; border: 1px solid #1e1b2e;
      border-radius: 12px;
    }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { color: #fff; margin-bottom: 8px; }
    .empty-state p { color: #8b85a0; font-size: 14px; }

    /* FOOTER */
    footer {
      text-align: center; padding: 32px;
      color: #4a4560; font-size: 12px;
      border-top: 1px solid #1e1b2e;
      margin-top: 48px;
    }
    footer a { color: #6B46FF; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span class="trust">Trust</span><span class="collect">Collect</span>
  </div>
  <div class="header-badge">Espace client privé</div>
</header>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <p>Chargement de votre tableau de bord…</p>
  </div>

  <div id="error" style="display:none">
    <p id="error-msg">Une erreur est survenue.</p>
  </div>

  <div id="dashboard">
    <!-- Client card -->
    <div class="client-card">
      <div class="client-header">
        <div style="display:flex;gap:16px;align-items:flex-start;flex:1">
          <div class="client-avatar" id="client-avatar">?</div>
          <div class="client-info">
            <div class="client-name" id="client-name">—</div>
            <div class="client-email" id="client-email">—</div>
            <div class="badges" id="client-badges"></div>
          </div>
        </div>
      </div>
      <div class="client-stats">
        <div class="stat">
          <div class="stat-value purple" id="stat-total">0</div>
          <div class="stat-label">Avis collectés</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-avg">—</div>
          <div class="stat-label">Note moyenne</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-affiche">0</div>
          <div class="stat-label">Affichés sur widget</div>
        </div>
      </div>
    </div>

    <!-- Avis section -->
    <div class="section-header">
      <div class="section-title">
        Avis reçus
        <span class="section-count" id="avis-count">0</span>
      </div>
      <div class="avg-stars" id="avg-display"></div>
    </div>

    <div class="avis-grid" id="avis-list"></div>
  </div>
</main>

<footer>
  Powered by <a href="https://trustcollect.fr">TrustCollect</a>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);
  const clientId = params.get('id');

  function starsHTML(note) {
    if (!note) return '';
    const n = Math.round(note);
    return '★'.repeat(n) + '☆'.repeat(5 - n);
  }

  function formatDate(d) {
    if (!d) return '';
    return new Date(d).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  }

  function getStatutClass(s) {
    if (!s) return '';
    const sl = s.toLowerCase();
    if (sl.includes('approuv')) return 'statut-approuve';
    if (sl.includes('rejet') || sl.includes('refus')) return 'statut-rejete';
    return 'statut-pending';
  }

  async function load() {
    if (!clientId) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-msg').textContent = 'Lien invalide — ID client manquant.';
      return;
    }

    try {
      const res = await fetch('/api/dashboard?id=' + encodeURIComponent(clientId));
      const data = await res.json();

      if (!res.ok || data.error) {
        throw new Error(data.error || 'Erreur serveur');
      }

      const { client, avis } = data;

      // Avatar initial
      const initial = (client.name || '?')[0].toUpperCase();
      document.getElementById('client-avatar').textContent = initial;
      document.getElementById('client-name').textContent = client.name || '—';
      document.getElementById('client-email').textContent = client.email || '';

      // Badges
      const badgesEl = document.getElementById('client-badges');
      if (client.plan) {
        badgesEl.innerHTML += `<span class="badge badge-plan">${client.plan}</span>`;
      }
      if (client.statut) {
        const sc = client.statut.toLowerCase().includes('actif') && !client.statut.toLowerCase().includes('in')
          ? 'badge-actif' : client.statut.toLowerCase().includes('essai')
          ? 'badge-essai' : 'badge-inactif';
        badgesEl.innerHTML += `<span class="badge ${sc}">${client.statut}</span>`;
      }
      if (client.dateInscription) {
        badgesEl.innerHTML += `<span class="badge badge-date">Depuis ${formatDate(client.dateInscription)}</span>`;
      }

      // Stats
      const total = avis.length;
      const affiche = avis.filter(a => a.affiche).length;
      const withNotes = avis.filter(a => a.note);
      const avg = withNotes.length ? (withNotes.reduce((s, a) => s + a.note, 0) / withNotes.length).toFixed(1) : null;

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-avg').textContent = avg ? avg + ' / 5' : '—';
      document.getElementById('stat-affiche').textContent = affiche;
      document.getElementById('avis-count').textContent = total;

      if (avg) {
        document.getElementById('avg-display').innerHTML =
          `<span style="color:#F59E0B">${starsHTML(parseFloat(avg))}</span> ${avg}/5`;
      }

      // Avis list
      const list = document.getElementById('avis-list');
      if (avis.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">💬</div>
            <h3>Aucun avis pour l'instant</h3>
            <p>Les avis collectés via votre widget apparaîtront ici.</p>
          </div>`;
      } else {
        list.innerHTML = avis.map(a => `
          <div class="avis-card">
            <div class="avis-top">
              <div class="avis-reviewer">
                <div class="avis-nom">${a.nom || 'Anonyme'}</div>
                ${a.email ? `<div class="avis-email">${a.email}</div>` : ''}
              </div>
              <div class="avis-meta">
                ${a.note ? `<div class="stars">${starsHTML(a.note)}</div>` : ''}
                ${a.date ? `<div class="avis-date">${formatDate(a.date)}</div>` : ''}
              </div>
            </div>
            ${a.avis ? `<div class="avis-text">${a.avis}</div>` : ''}
            <div class="avis-footer">
              ${a.statut ? `<span class="statut-badge ${getStatutClass(a.statut)}">${a.statut}</span>` : ''}
              ${a.affiche ? `<span class="affiche-badge">✓ Affiché widget</span>` : ''}
            </div>
          </div>
        `).join('');
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-msg').textContent = 'Erreur : ' + err.message;
    }
  }

  load();
</script>
</body>
</html>
